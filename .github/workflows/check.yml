name: Check & Notify

on:
  schedule:
    # 每 30 分钟检查一次（可自行调整）
    - cron: "*/30 * * * *"
  workflow_dispatch: # 支持手动触发并选择环境
    inputs:
      target_env:
        description: "选择运行环境（对应 GitHub Environments）"
        required: true
        default: test
        type: choice
        options:
          - test
          - prod

# 需要写入权限，用于提交 state.json
permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    # 定时任务默认使用 test；手动触发可选择 test/prod
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.target_env || 'test' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python -u check.py

      - name: Commit state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "chore: update state.json [skip ci]"
          git push
